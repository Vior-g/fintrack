// ── Supabase Sync Engine ──
let _sb=null;let _channel=null;
function getSB(url,key){
  if(_sb)return _sb;if(!url||!key)return null;
  try{
    // Supabase v2 UMD exposes window.supabase with createClient
    const lib=window.supabase;
    if(!lib||!lib.createClient){console.error("Supabase lib not loaded");return null;}
    _sb=lib.createClient(url,key);
    return _sb;
  }catch(e){console.error("Supabase init error:",e);return null;}
}

async function syncToCloud(code,data,who){
  const c=loadCouple();if(!c||!c.url||!c.key||!code)return false;
  const sb=getSB(c.url,c.key);if(!sb)return false;
  try{const{error}=await sb.from("rooms").upsert({code,data,updated_by:who||"?",updated_at:new Date().toISOString()},{onConflict:"code"});if(error)console.error("Sync error:",error.message);return !error;}catch(e){console.error("Sync exception:",e);return false;}
}
async function loadFromCloud(code){
  const c=loadCouple();if(!c||!c.url||!c.key||!code)return null;
  const sb=getSB(c.url,c.key);if(!sb){console.error("No SB client for load");return null;}
  try{const{data,error}=await sb.from("rooms").select("data,updated_by,updated_at").eq("code",code).single();if(error){console.error("Load error:",error.message);return null;}return data;}catch(e){console.error("Load exception:",e);return null;}
}
function subscribeToRoom(code,onChange){
  const c=loadCouple();if(!c||!c.url||!c.key||!code)return null;
  const sb=getSB(c.url,c.key);if(!sb)return null;
  if(_channel){_channel.unsubscribe();_channel=null;}
  _channel=sb.channel("room-"+code).on("postgres_changes",{event:"UPDATE",schema:"public",table:"rooms",filter:`code=eq.${code}`},(payload)=>{if(payload.new&&payload.new.data){onChange(payload.new.data,payload.new.updated_by);}}).subscribe();
  return _channel;
}

async function fetchSP(sym){
  // Source 1: Yahoo via CORS proxy (most reliable)
  try{const r=await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=5m&range=1d`,{signal:AbortSignal.timeout(8000)});if(!r.ok)throw new Error();const d=await r.json();const x=d.chart?.result?.[0];if(!x)throw new Error();const cl=x.indicators?.quote?.[0]?.close?.filter(Boolean)||[];return{price:x.meta.regularMarketPrice,prev:x.meta.chartPreviousClose,history:cl};}catch(e){}
  // Source 2: Twelve Data free (no key needed for basic quotes)
  try{const r=await fetch(`https://api.twelvedata.com/quote?symbol=${sym}&apikey=demo`,{signal:AbortSignal.timeout(6000)});if(!r.ok)throw new Error();const d=await r.json();if(d.code)throw new Error();return{price:parseFloat(d.close),prev:parseFloat(d.previous_close),history:[]};}catch(e){}

function MC({data,color,width=120,height=40}){if(!data||data.length<2)return(<div style={{width,height}}/>);const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;const uid="g"+Math.random().toString(36).slice(2,8);const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*(height-4)-2}`).join(" ");return(<svg width={width} height={height} style={{display:"block"}}><defs><linearGradient id={uid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><polyline fill="none" stroke={color} strokeWidth="1.5" points={pts}/><polygon fill={`url(#${uid})`} points={`0,${height} ${pts} ${width},${height}`}/></svg>);}
function BC({data,labels,color,t,height=160}){const mx=Math.max(...data,1);return(<div style={{display:"flex",alignItems:"flex-end",gap:6,height,padding:"0 4px"}}>{data.map((v,i)=>{const h=mx>0?(v/mx)*(height-28):0;return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:9,fontFamily:"Space Mono",color:t.text2,fontWeight:700}}>{v>0?v.toFixed(0):""}</span><div style={{width:"100%",height:h,borderRadius:"6px 6px 2px 2px",background:color,opacity:0.8,transition:"height .4s ease",minHeight:v>0?4:0}}/><span style={{fontSize:8,fontFamily:"DM Sans",color:t.text3}}>{labels[i]}</span></div>);})}</div>);}
function LC({data,labels,color,t,height=140}){if(!data||data.length<2)return null;const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;const w=500;const uid="lc"+Math.random().toString(36).slice(2,8);const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${height-((v-mn)/rng)*(height-30)-15}`).join(" ");const dots=data.map((v,i)=>({x:(i/(data.length-1))*w,y:height-((v-mn)/rng)*(height-30)-15}));return(<div><svg viewBox={`0 0 ${w} ${height}`} style={{width:"100%",height:"auto",display:"block"}}><defs><linearGradient id={uid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.2"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><polyline fill="none" stroke={color} strokeWidth="2.5" points={pts} strokeLinejoin="round"/><polygon fill={`url(#${uid})`} points={`0,${height} ${pts} ${w},${height}`}/>{dots.map((p,i)=>(<circle key={i} cx={p.x} cy={p.y} r="4" fill={color} stroke={t.card} strokeWidth="2"/>))}</svg>{labels&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 2px"}}>{labels.map((l,i)=>(<span key={i} style={{fontSize:8,color:t.text3}}>{l}</span>))}</div>}</div>);}
function Donut({segments,size=150,t,cs}){const total=segments.reduce((s,x)=>s+x.value,0);if(total===0)return null;const r=size/2-10,c=size/2;let cum=0;const paths=segments.map((seg,i)=>{const pct=seg.value/total,gap=0.005;const start=(cum+gap)*2*Math.PI-Math.PI/2;cum+=pct;const end=(cum-gap)*2*Math.PI-Math.PI/2;if(pct<0.01)return null;const large=pct>0.5?1:0;const x1=c+r*Math.cos(start),y1=c+r*Math.sin(start),x2=c+r*Math.cos(end),y2=c+r*Math.sin(end);return(<path key={i} d={`M ${c} ${c} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`} fill={seg.color} opacity="0.85"/>);});return(<svg width={size} height={size}>{paths}<circle cx={c} cy={c} r={r*0.55} fill={t.bg}/><text x={c} y={c-4} textAnchor="middle" fill={t.text} fontSize="15" fontFamily="Space Mono" fontWeight="700">{total.toFixed(0)}{cs}</text><text x={c} y={c+12} textAnchor="middle" fill={t.text2} fontSize="9" fontFamily="DM Sans">/mois</text></svg>);}

  useEffect(()=>{if(!dataLoaded)return;const nw=crypto.reduce((s,c)=>s+c.price*c.held,0)+stocks.reduce((s,c)=>s+c.price*c.held,0)+re.reduce((s,r)=>s+(r.value-r.loan),0)+goals.reduce((s,g)=>s+g.current,0);const curM=new Date().toISOString().slice(0,7)+"-01";setNwHistory(prev=>{const ex=prev.find(x=>x.date===curM);if(ex)return prev.map(x=>x.date===curM?{...x,value:nw}:x);return[...prev,{date:curM,value:nw}].slice(-12);});},[dataLoaded,crypto,stocks,re,goals]);

  const mSubs=subs.reduce((s,x)=>s+x.amount,0);const mRent=re.reduce((s,r)=>s+r.rent,0);const curMonth=new Date().toISOString().slice(0,7);const tExp=expenses.filter(e=>e.date.startsWith(curMonth)).reduce((s,e)=>s+e.amount,0);

  const aiSummary=useMemo(()=>{const lines=[];const diff=tExp-prevExp;const pct=prevExp>0?((diff/prevExp)*100).toFixed(0):0;if(diff>0)lines.push(`📊 Tu as dépensé ${Math.abs(pct)}% de plus que le mois dernier.`);else if(diff<0)lines.push(`✅ Bravo ! ${Math.abs(pct)}% de moins que le mois dernier.`);if(predOverBudget)lines.push(`⚠️ À ce rythme, tu vas dépenser ~${fmtN(predictedExp)}€ ce mois (budget: ${fmtN(monthlyBudget)}€).`);else if(dayOfMonth>10)lines.push(`📐 Projection : ~${fmtN(predictedExp)}€ — dans le budget.`);if(budgetStreak>1)lines.push(`🔥 ${budgetStreak} mois consécutifs sous le budget !`);if(budgetPct>90)lines.push("⚠️ Budget presque atteint !");else if(budgetPct<50&&dayOfMonth>15)lines.push("👍 Budget bien géré !");if(savingsRate>25)lines.push(`🌟 Épargne ${savingsRate.toFixed(0)}% — excellent !`);const topTrend=catTrends.filter(c=>c.prev>0&&c.diff>30).sort((a,b)=>b.diff-a.diff)[0];if(topTrend)lines.push(`📈 ${topTrend.cat} en hausse de ${topTrend.diff.toFixed(0)}% vs mois dernier.`);const overCat=catTrends.filter(c=>c.budget>0&&c.cur>c.budget);if(overCat.length>0)lines.push(`🚨 Budget dépassé : ${overCat.map(c=>c.cat).join(", ")}.`);if(cPL+sPL>0)lines.push(`📈 Investissements : +${fmtN(cPL+sPL)}€`);if(totalTax>0)lines.push(`🧾 Impôt estimé : ${fmtN(totalTax)}€`);return lines;},[tExp,prevExp,budgetPct,savingsRate,cPL,sPL,expenses,curMonth,totalTax,predictedExp,predOverBudget,budgetStreak,catTrends,dayOfMonth,monthlyBudget]);

      {stocks.map(s=>{const pl=(s.price-s.avgBuy)*s.held;return(<SwipeRow key={s.symbol} onDelete={()=>removeS(s.symbol)} t={t} mob={mob}><div style={{background:t.input,borderRadius:10,padding:12,border:`1px solid ${t.border}`,cursor:"pointer",marginBottom:6}} onClick={()=>setDetailView({type:"stock",data:s})}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:14}}>{s.icon}</span><span style={{color:t.text,fontWeight:600,fontSize:13}}>{s.symbol}</span></div><div style={{display:"flex",gap:2}} onClick={e=>e.stopPropagation()}><IB icon="✎" onClick={()=>{setMd({symbol:s.symbol,held:s.held.toString(),avgBuy:s.avgBuy.toString(),name:s.name});setModal("editS");}} hc={t.accent2} t={t}/><IB icon="✕" onClick={()=>removeS(s.symbol)} t={t}/></div></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"end"}}><div><AN value={s.price*cr} fmt={fmtN} color={t.text} size={14}/><span style={{color:t.text}}>{cs}</span><div style={{display:"flex",gap:6,marginTop:2}}><span style={{fontFamily:"Space Mono",fontSize:10,color:s.change>=0?t.green:t.red}}>{s.change>=0?"+":""}{s.change.toFixed(2)}%</span><PLB pl={pl}/></div><div style={{color:t.text3,fontSize:10,fontFamily:"Space Mono",marginTop:2}}>{s.held}p = <span style={{color:t.blue,fontWeight:700}}>{fmtC(s.price*s.held)}</span></div></div><MC data={s.history.length>0?s.history:genFB(s.price||100)} color={s.change>=0?t.green:t.red} width={mob?80:100} height={30}/></div></div></SwipeRow>);})}
    </Card>
    {alerts.length>0&&<Card><ST>Alertes</ST>{alerts.map(a=>(<div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:t.input,borderRadius:8,border:`1px solid ${t.border}`,marginBottom:4}}><span style={{color:t.text,fontSize:12}}>🔔 {a.name} {a.condition==="above"?"▲":"▼"} <b>{a.target}€</b></span><IB icon="✕" onClick={()=>dismissAlert(a.id)} t={t}/></div>))}</Card>}
    <Card><ST action={<Bt small accent t={t} onClick={()=>{setMd({name:"",value:"",loan:"",rent:"",icon:"🏠"});setModal("addRE");}}>+ Bien</Bt>}>Immobilier</ST><div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(auto-fit,minmax(260px,1fr))",gap:10}}>{re.map(r=>(<div key={r.id} style={{background:t.input,borderRadius:12,padding:14,border:`1px solid ${t.border}`,position:"relative"}}><div style={{position:"absolute",top:8,right:8,display:"flex",gap:4}}><IB icon="✎" onClick={()=>{setMd({...r});setModal("editRE");}} hc={t.accent2} t={t}/><IB icon="✕" onClick={()=>removeRE2(r.id)} t={t}/></div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span style={{fontSize:22}}>{r.icon}</span><span style={{color:t.text,fontWeight:600,fontSize:13}}>{r.name}</span></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:11}}><div><span style={{color:t.text3}}>Valeur</span><div style={{color:t.text,fontFamily:"Space Mono",fontWeight:700}}>{fmtK(r.value)}{cs}</div></div><div><span style={{color:t.text3}}>Dû</span><div style={{color:t.red,fontFamily:"Space Mono",fontWeight:700}}>{fmtK(r.loan)}{cs}</div></div><div><span style={{color:t.text3}}>Equity</span><div style={{color:t.purple,fontFamily:"Space Mono",fontWeight:700}}>{fmtK(r.value-r.loan)}{cs}</div></div><div><span style={{color:t.text3}}>Loyer</span><div style={{color:t.green,fontFamily:"Space Mono",fontWeight:700}}>{fmtC(r.rent)}</div></div></div></div>))}</div></Card>
  </div>);

  // ════ GOALS ════
  const renderGoals=()=>(<div style={{display:"flex",flexDirection:"column",gap:mob?12:16}}><Card><ST action={<Bt small accent t={t} onClick={()=>{setMd({name:"",target:"",icon:"🎯"});setModal("addGoal");}}>+ Objectif</Bt>}>Mes Objectifs</ST><div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(auto-fit,minmax(300px,1fr))",gap:12}}>{goals.map(g=>{const pct=Math.min(100,(g.current/g.target)*100);const done=pct>=100;return(<div key={g.id} style={{background:t.input,borderRadius:14,padding:mob?16:20,border:`1px solid ${done?g.color+"66":t.border}`,position:"relative",overflow:"hidden"}}>{confettiId===g.id&&<Confetti active/>}<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${pct}%`,background:g.color+"08",transition:"height .5s ease",pointerEvents:"none"}}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:26}}>{g.icon}</span><div><div style={{color:t.text,fontWeight:600,fontSize:14}}>{g.name} {done&&"🎉"}</div><div style={{color:t.text3,fontSize:10}}>Objectif : {fmtC(g.target)}</div></div></div><IB icon="✕" onClick={()=>removeGoal(g.id)} t={t}/></div><AN value={g.current*cr} fmt={fmtN} color={g.color} size={mob?20:24}/><span style={{color:g.color,fontSize:mob?20:24,fontFamily:"Space Mono",fontWeight:700}}>{cs}</span><div style={{background:t.border,borderRadius:6,height:8,margin:"8px 0",overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:`linear-gradient(90deg,${g.color},${g.color}aa)`,width:`${pct}%`,transition:"width .5s ease"}}/></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:5}}><span style={{color:t.text2,fontSize:11}}>{pct.toFixed(0)}%</span><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{[50,100,500].map(a=>(<button key={a} onClick={()=>adjGoal(g.id,a)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${g.color}44`,background:"transparent",color:g.color,fontSize:10,fontFamily:"Space Mono",cursor:"pointer",fontWeight:700}}>+{a}</button>))}{[50,100].map(a=>(<button key={"m"+a} onClick={()=>adjGoal(g.id,-a)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${t.red}44`,background:"transparent",color:t.red,fontSize:10,fontFamily:"Space Mono",cursor:"pointer",fontWeight:700}}>-{a}</button>))}<button onClick={()=>{setMd({goalId:g.id,amount:"",goalName:g.name});setModal("adjGoal");}} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${t.border2}`,background:"transparent",color:t.text2,fontSize:10,fontFamily:"Space Mono",cursor:"pointer",fontWeight:700}}>±</button></div></div></div>);})}</div></Card></div>);

  // ════ REPORT (with month filter + comparison) ════
  const renderReport=()=>{
    const rExp=expenses.filter(e=>e.date.startsWith(rptMonth));const rTotal=rExp.reduce((s,e)=>s+e.amount,0);
    const rCat=Object.entries(rExp.reduce((a,e)=>{a[e.category]=(a[e.category]||0)+e.amount;return a;},{})).sort((a,b)=>b[1]-a[1]);
    const mRecT=recurring.reduce((s,r)=>s+r.amount,0);const solde=mIncome-rTotal-mSubs-mRecT;
    const rLabel=new Date(rptMonth+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
    // Comparison data
    const hasCmp=cmpMonth&&cmpMonth!==rptMonth;
    const cmpExp=hasCmp?expenses.filter(e=>e.date.startsWith(cmpMonth)):[];const cmpTotal=cmpExp.reduce((s,e)=>s+e.amount,0);
    const cmpCat=hasCmp?Object.entries(cmpExp.reduce((a,e)=>{a[e.category]=(a[e.category]||0)+e.amount;return a;},{})).sort((a,b)=>b[1]-a[1]):[];
    const cmpLabel=hasCmp?new Date(cmpMonth+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"}):"";
    const diffPct=hasCmp&&cmpTotal>0?((rTotal-cmpTotal)/cmpTotal*100).toFixed(1):null;
    const cmpSolde=hasCmp?mIncome-cmpTotal-mSubs-mRecT:0;
    const CmpBadge=({a,b})=>{if(!hasCmp||!b)return null;const d=a-b;const p=b>0?((d/b)*100).toFixed(0):0;return(<span style={{fontFamily:"Space Mono",fontSize:10,fontWeight:700,color:d<=0?t.green:t.red,marginLeft:6}}>{d>0?"+":""}{p}%</span>);};
  return(<div style={{display:"flex",flexDirection:"column",gap:mob?12:16}}>
    {/* Month selector */}
    <Card style={{padding:mob?14:18}}>
      <div style={{display:"flex",gap:mob?8:12,flexWrap:"wrap",alignItems:"end"}}>
        <div style={{flex:1,minWidth:140}}>
          <label style={{color:t.text2,fontSize:11,display:"block",marginBottom:4}}>📅 Mois analysé</label>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>{const i=availMonths.indexOf(rptMonth);if(i<availMonths.length-1)setRptMonth(availMonths[i+1]);}} style={{padding:"10px",background:t.input,border:`1px solid ${t.border2}`,borderRadius:10,color:t.text,cursor:"pointer",fontSize:14}}>◀</button>
            <select value={rptMonth} onChange={e=>setRptMonth(e.target.value)} style={{flex:1,padding:"10px 12px",background:t.input,border:`1px solid ${t.border2}`,borderRadius:10,color:t.text,fontSize:13,fontFamily:"DM Sans",outline:"none"}}>{availMonths.map(m=>(<option key={m} value={m}>{new Date(m+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}</option>))}</select>
            <button onClick={()=>{const i=availMonths.indexOf(rptMonth);if(i>0)setRptMonth(availMonths[i-1]);}} style={{padding:"10px",background:t.input,border:`1px solid ${t.border2}`,borderRadius:10,color:t.text,cursor:"pointer",fontSize:14}}>▶</button>
          </div>
        </div>
        <div style={{flex:1,minWidth:140}}>
          <label style={{color:t.text2,fontSize:11,display:"block",marginBottom:4}}>🔄 Comparer avec</label>
          <select value={cmpMonth} onChange={e=>setCmpMonth(e.target.value)} style={{width:"100%",padding:"10px 12px",background:t.input,border:`1px solid ${t.border2}`,borderRadius:10,color:t.text,fontSize:14,fontFamily:"DM Sans",outline:"none"}}><option value="">— Aucune comparaison —</option>{availMonths.filter(m=>m!==rptMonth).map(m=>(<option key={m} value={m}>{new Date(m+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}</option>))}</select>
        </div>
      </div>
      {hasCmp&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:10,background:parseFloat(diffPct)<=0?t.green+"15":t.red+"15",border:`1px solid ${parseFloat(diffPct)<=0?t.green:t.red}33`}}>
        <span style={{color:t.text,fontSize:13}}>📊 <b>{rLabel}</b> vs <b>{cmpLabel}</b> : </span>
        <span style={{fontFamily:"Space Mono",fontSize:14,fontWeight:700,color:parseFloat(diffPct)<=0?t.green:t.red}}>{parseFloat(diffPct)>0?"+":""}{diffPct}% {parseFloat(diffPct)<=0?"de dépenses en moins 👏":"de dépenses en plus"}</span>
      </div>}
    </Card>

    {aiSummary.length>0&&rptMonth===curMonth&&<Card style={{borderLeft:`3px solid ${t.accent2}`}}><div style={{color:t.text2,fontSize:11,marginBottom:8}}>🤖 ANALYSE</div>{aiSummary.map((l,i)=>(<div key={i} style={{color:t.text,fontSize:13,marginBottom:4,lineHeight:1.5}}>{l}</div>))}</Card>}

    {/* Summary cards with comparison */}
    {rptMonth===curMonth&&<Card style={{padding:mob?14:18}}>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <div style={{position:"relative",width:72,height:72,flexShrink:0}}><svg width="72" height="72" viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="none" stroke={t.border} strokeWidth="7"/><circle cx="36" cy="36" r="30" fill="none" stroke={healthColor} strokeWidth="7" strokeDasharray={`${healthScore*1.885} 188.5`} strokeLinecap="round" transform="rotate(-90 36 36)" style={{transition:"stroke-dasharray .8s ease"}}/></svg><span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Space Mono",fontSize:22,fontWeight:700,color:healthColor}}>{healthScore}</span></div>
        <div><div style={{color:t.text,fontSize:15,fontWeight:700,marginBottom:2}}>Santé financière : {healthLabel}</div><div style={{color:t.text2,fontSize:12,lineHeight:1.5}}>{healthScore>=80?"Tes finances sont solides. Continue comme ça !":healthScore>=60?"Bonne gestion. Quelques optimisations possibles.":healthScore>=40?"Marge de progression. Focalise-toi sur l'épargne et le budget.":"Attention, revois ton budget et tes dépenses."}</div>{budgetStreak>0&&<div style={{marginTop:6,color:t.orange,fontSize:12,fontWeight:700}}>🔥 Streak: {budgetStreak} mois sous le budget</div>}</div>
      </div>
    </Card>}
    <Card style={{background:t.gradCard}}><div style={{color:t.text2,fontSize:11,marginBottom:8}}>RÉSUMÉ — {rLabel.toUpperCase()}</div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10}}>
        {[{l:"💰 Revenus",v:fmtC(mIncome),c:t.green},{l:"💸 Dépenses",v:fmtC(rTotal+mSubs+mRecT),v2:hasCmp?fmtC(cmpTotal+mSubs+mRecT):null,c:t.red},{l:"📊 Solde",v:(solde>=0?"+":"")+fmtC(Math.abs(solde)),v2:hasCmp?(cmpSolde>=0?"+":"")+fmtC(Math.abs(cmpSolde)):null,c:solde>=0?t.green:t.red},{l:"🏦 Patrimoine",v:fmtK(netW)+cs,c:t.accent}].map(x=>(<div key={x.l} style={{padding:12,background:t.input,borderRadius:10,border:`1px solid ${t.border}`}}><div style={{color:t.text2,fontSize:11,marginBottom:6}}>{x.l}</div><div style={{fontFamily:"Space Mono",fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div>{x.v2&&<div style={{fontFamily:"Space Mono",fontSize:11,color:t.text3,marginTop:4}}>vs {cmpLabel}: {x.v2}</div>}</div>))}
      </div>
    </Card>

    {/* Category comparison */}
    <Card><ST>Catégories — {rLabel}{hasCmp&&" vs "+cmpLabel}</ST>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {rCat.map(([cat,val])=>{const pct=rTotal>0?(val/rTotal)*100:0;const cmpVal=hasCmp?cmpCat.find(([c])=>c===cat)?.[1]||0:0;const diff=hasCmp?val-cmpVal:0;
        return(<div key={cat} style={{padding:"10px 0",borderBottom:`1px solid ${t.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,width:24,textAlign:"center"}}>{CI[cat]||"📦"}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:t.text,fontSize:13}}>{cat}</span>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontFamily:"Space Mono",fontSize:12,fontWeight:700,color:t.text}}>{fmtC(val)}</span>
                  {hasCmp&&<span style={{fontFamily:"Space Mono",fontSize:10,fontWeight:700,color:diff<=0?t.green:t.red}}>({diff>0?"+":""}{fmtN(diff*cr)}{cs})</span>}
                </div>
              </div>
              <div style={{background:t.border,borderRadius:4,height:6,overflow:"hidden",position:"relative"}}>
                <div style={{height:"100%",borderRadius:4,background:CC[cat]||"#888",width:`${pct}%`,transition:"width .3s"}}/>
                {hasCmp&&cmpTotal>0&&<div style={{position:"absolute",top:0,height:"100%",width:2,background:t.text,opacity:0.4,left:`${(cmpVal/rTotal)*100}%`}}/>}
              </div>
              {hasCmp&&<div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:9,color:t.text3}}>Ce mois: {pct.toFixed(0)}%</span><span style={{fontSize:9,color:t.text3}}>{cmpLabel}: {fmtC(cmpVal)}</span></div>}
            </div>
          </div>
        </div>);})}
      </div>
    </Card>

    {/* Monthly comparison bar chart */}
    {hasCmp&&<Card><ST>Comparaison visuelle</ST>
      <div style={{display:"flex",gap:mob?16:24,justifyContent:"center",alignItems:"flex-end",height:160,padding:"0 20px"}}>
        {[{label:rLabel.split(" ")[0],val:rTotal,color:t.accent2},{label:cmpLabel.split(" ")[0],val:cmpTotal,color:t.text3}].map((x,i)=>{const mx=Math.max(rTotal,cmpTotal)||1;const h=(x.val/mx)*120;return(<div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,flex:1,maxWidth:120}}>
          <span style={{fontFamily:"Space Mono",fontSize:13,fontWeight:700,color:x.color}}>{fmtC(x.val)}</span>
          <div style={{width:"100%",height:h,borderRadius:"10px 10px 4px 4px",background:x.color,opacity:0.8,transition:"height .4s ease"}}/>
          <span style={{fontSize:11,color:t.text2}}>{x.label}</span>
        </div>);})}
      </div>
    </Card>}

    {totalTax>0&&<Card><ST>🧾 Fiscalité</ST><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div style={{padding:12,background:t.input,borderRadius:10}}><div style={{color:t.text2,fontSize:10}}>PV Crypto</div><div style={{fontFamily:"Space Mono",fontSize:16,fontWeight:700,color:cPL>=0?t.green:t.red}}>{cPL>=0?"+":""}{fmtC(cPL)}</div><div style={{color:t.text3,fontSize:10,marginTop:4}}>Impôt: {fmtC(cTax)}</div></div><div style={{padding:12,background:t.input,borderRadius:10}}><div style={{color:t.text2,fontSize:10}}>PV Bourse</div><div style={{fontFamily:"Space Mono",fontSize:16,fontWeight:700,color:sPL>=0?t.green:t.red}}>{sPL>=0?"+":""}{fmtC(sPL)}</div><div style={{color:t.text3,fontSize:10,marginTop:4}}>Impôt: {fmtC(sTax)}</div></div></div><div style={{marginTop:10,padding:"10px 14px",background:t.orange+"11",borderRadius:10,display:"flex",justifyContent:"space-between"}}><span style={{color:t.text,fontSize:13,fontWeight:600}}>Total impôt estimé</span><span style={{fontFamily:"Space Mono",fontSize:16,fontWeight:700,color:t.orange}}>{fmtC(totalTax)}</span></div></Card>}
    {nwHistory.length>1&&<Card><ST>Patrimoine</ST><LC data={nwHistory.map(x=>x.value*cr)} labels={nwHistory.map(x=>new Date(x.date).toLocaleDateString("fr-FR",{month:"short"}))} color={t.accent} t={t} height={160}/></Card>}
    <Card><ST>Historique dépenses</ST><BC data={monthlyHist.map(m=>m.total*cr)} labels={monthlyHist.map(m=>m.label)} color={t.accent2} t={t} height={140}/></Card>
    <div style={{display:"flex",gap:8}}><Bt full t={t} onClick={()=>exportCSV(rExp)}>📥 CSV ({rLabel})</Bt><Bt full t={t} onClick={()=>exportCSV(expenses)}>📥 CSV (tout)</Bt></div>
  </div>);};

  // ════ RENDER ════
  if(showOnboard)return(<Onboarding onDone={()=>setShowOnboard(false)} t={t}/>);
  return(<div style={{minHeight:"100vh",background:t.bg,color:t.text,fontFamily:"DM Sans,sans-serif",paddingBottom:mob?80:40,transition:"background .3s,color .3s"}}>
    <link href={FONTS} rel="stylesheet"/>
    <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes slideFromBottom{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes fadeOut{to{opacity:0}}@keyframes fabPop{from{transform:scale(0)}to{transform:scale(1)}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:${t.border};border-radius:2px}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}body{margin:0;overscroll-behavior:none;background:${t.bg}}`}</style>
    <div style={{padding:mob?"12px 16px":"14px 20px",borderBottom:`1px solid ${t.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(16px)",background:t.headerBg,paddingTop:"max(12px,env(safe-area-inset-top))"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:mob?28:32,height:mob?28:32,borderRadius:8,background:"linear-gradient(135deg,#00e5a0,#00b4d8)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Space Mono",fontWeight:700,fontSize:mob?12:14,color:"#0d1117"}}>F</div><span style={{fontFamily:"Space Mono",fontSize:mob?13:15,fontWeight:700}}>FinTrack<span style={{color:t.accent}}>.</span></span>{!isOnline&&<span style={{fontSize:10,color:t.orange,fontFamily:"Space Mono"}}>offline</span>}{coupleMode&&<span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:20,background:syncStatus==="synced"?t.green+"22":syncStatus==="syncing"?t.orange+"22":t.red+"22",fontSize:9,fontFamily:"Space Mono",fontWeight:700,color:syncStatus==="synced"?t.green:syncStatus==="syncing"?t.orange:t.red}}>{syncStatus==="synced"&&<span style={{width:5,height:5,borderRadius:"50%",background:t.green,animation:"pulse 1.5s infinite"}}/>}👫 {syncStatus==="synced"?"SYNC":syncStatus==="syncing"?"...":"ERR"}</span>}</div>
      <div style={{display:"flex",alignItems:"center",gap:mob?4:8}}>
        <button onClick={()=>setShowSearch(true)} style={{background:"none",border:"none",fontSize:mob?16:18,cursor:"pointer",padding:4}}>🔍</button>
        <button onClick={()=>setModal("profile")} style={{background:"none",border:"none",cursor:"pointer",padding:2}}>{profile.avatar?<img src={profile.avatar} style={{width:26,height:26,borderRadius:13,objectFit:"cover"}}/>:<span style={{fontSize:mob?16:18}}>👤</span>}</button>
        <button onClick={()=>setDark(p=>!p)} style={{background:"none",border:"none",fontSize:mob?16:18,cursor:"pointer",padding:4}}>{dark?"☀️":"🌙"}</button>
        {!mob&&<div style={{display:"flex",gap:2,background:t.card,borderRadius:10,padding:3,border:`1px solid ${t.border}`}}>{TABS.map(tt=>(<button key={tt.id} onClick={()=>setTab(tt.id)} style={{padding:"7px 12px",borderRadius:8,border:"none",background:tab===tt.id?t.border:"transparent",color:tab===tt.id?t.text:t.text3,fontFamily:"DM Sans",fontSize:12,fontWeight:500,cursor:"pointer"}}>{tt.label}</button>))}</div>}
      </div>

// iOS install banner
function InstallBanner(){
  const[show,setShow]=useState(false);
  const isStandalone=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;
  useEffect(()=>{if(!isStandalone&&/iPhone|iPad/.test(navigator.userAgent)){setTimeout(()=>setShow(true),2000);}},[]);
  if(!show||isStandalone)return null;
  return React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,zIndex:2000,background:"linear-gradient(180deg,transparent,#0d1117ee 20%,#0d1117)",padding:"40px 20px max(32px,env(safe-area-inset-bottom))",textAlign:"center",animation:"slideFromBottom .3s ease"},onClick:()=>setShow(false)},
    React.createElement("div",{style:{background:"#161b22",border:"1px solid #30363d",borderRadius:16,padding:"20px",maxWidth:360,margin:"0 auto"}},
      React.createElement("div",{style:{fontSize:40,marginBottom:8}},"\ud83d\udcf2"),
      React.createElement("div",{style:{color:"#f0f0f0",fontSize:15,fontWeight:600,marginBottom:6}},"Installer FinTrack"),
      React.createElement("div",{style:{color:"#8b949e",fontSize:12,lineHeight:1.5,marginBottom:12}},"Appuie sur \u2b06\ufe0f puis \"Sur l\u2019\xe9cran d\u2019accueil\" pour installer."),
      React.createElement("button",{onClick:()=>setShow(false),style:{background:"linear-gradient(135deg,#00e5a0,#00b4d8)",border:"none",borderRadius:10,padding:"10px 24px",color:"#0d1117",fontSize:13,fontWeight:700,cursor:"pointer"}},"Compris !")
    )
  );
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.Fragment,null,React.createElement(FinanceApp),React.createElement(InstallBanner)));
